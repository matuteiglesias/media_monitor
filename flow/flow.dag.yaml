$schema: https://azuremlschemas.azureedge.net/promptflow/latest/Flow.schema.json

inputs:
  id_digest:
    type: string
  digest_group_id:
    type: string
  window_type:
    type: string
  topic:
    type: string
  group_number:
    type: string
  content:
    type: string
    description: "Markdown digest for the group (one line per item, no links needed)."

outputs:
  # Pass-through IDs so downstream stages can join on groups deterministically
  id_digest:
    type: string
    reference: ${inputs.id_digest}
  digest_group_id:
    type: string
    reference: ${inputs.digest_group_id}
  window_type:
    type: string
    reference: ${inputs.window_type}
  topic:
    type: string
    reference: ${inputs.topic}
  group_number:
    type: string
    reference: ${inputs.group_number}

  # Editorial outputs
  clustered_agenda_table:
    type: object
    reference: ${parse_and_cluster.output}
  seed_ideas:
    type: object
    reference: ${generate_ideas.output}

nodes:
  - name: parse_and_cluster_prompt
    type: prompt
    source:
      type: jinja2
      path: news.articles.parse_and_cluster.topic_clusters.v1.jinja2
    inputs:
      content: ${inputs.content}

  - name: parse_and_cluster
    type: python
    source:
      type: code
      path: llm_wrapper.py
    inputs:
      prompt: ${parse_and_cluster_prompt.output}
      schema_path: ./01_parse_and_cluster_articles.json
      deployment_name: gpt-4o-mini
    connection: open_ai_connection
    outputs:
      output: ${parse_and_cluster.result}

  - name: generate_ideas_prompt
    type: prompt
    source:
      type: jinja2
      path: news.agenda.generate.seed_ideas.v1.jinja2
    inputs:
      clustered_agenda_table: ${parse_and_cluster.output}
      # You can also pass topic/window_type here if your template wants it:
      # topic: ${inputs.topic}
      # window_type: ${inputs.window_type}

  - name: generate_ideas
    type: python
    source:
      type: code
      path: llm_wrapper.py
    inputs:
      prompt: ${generate_ideas_prompt.output}
      schema_path: ./02_generate_agenda_and_ideas.json
      deployment_name: gpt-4o-mini
    connection: open_ai_connection
    outputs:
      output: ${generate_ideas.result}
